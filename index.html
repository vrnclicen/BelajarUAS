<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Belajar UAS Matematika</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #728156;
            --primary-hover: #88976C;
            --secondary: #98A77C;
            --bg-glass: rgba(255, 255, 255, 0.4);
            --border-glass: rgba(255, 255, 255, 0.6);
            --text-main: #2C3520;
            --text-muted: #5e6b45;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #E7F5DC, #CFE1B9, #B6C99B, #CFE1B9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #728156, #98A77C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Toggle Container */
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(114, 129, 86, 0.4);
            color: #fff;
        }

        /* Content Areas */
        #mode-hafalan, #mode-ujian {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        #mode-hafalan.active, #mode-ujian.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hafalan Mode (List) */
        .qna-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .qna-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .question {
            white-space: pre-wrap;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .answer {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            padding-left: 15px;
            border-left: 3px solid var(--primary);
        }

        /* Ujian Mode (Flashcard) */
        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flashcard {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .flashcard .q-text {
            white-space: pre-wrap;
            text-align: left;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .flashcard .a-text {
            font-size: 1.3rem;
            color: var(--text-main);
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.4s ease-out;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            width: 100%;
        }

        .flashcard .a-text.visible {
            display: block;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: #fff;
        }

        .btn-success { background: linear-gradient(135deg, #10b981, #059669); border: none; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; }

        .hidden { display: none !important; }

        .progress {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 40px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--secondary) var(--progress), var(--bg-glass) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(152, 167, 124, 0.4);
        }

        .score-circle::before {
            content: "";
            position: absolute;
            inset: 10px;
            background: #E7F5DC;
            border-radius: 50%;
            z-index: 1;
        }

        .score-value {
            position: relative;
            z-index: 2;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .code-box {
            background: #f8f9fa;
            color: #24292e;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1rem;
            text-align: left;
            margin-top: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            border: 1px solid #e1e4e8;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Persiapan UAS</h1>
            <p class="subtitle">Pelajari materinya, lalu uji kemampuanmu!</p>
            <div style="margin-top: 15px;">
                <label for="subject-select" style="font-weight: 600; color: var(--text-main);">Mata Kuliah: </label>
                <select id="subject-select" onchange="changeSubject()" style="padding: 8px 12px; border-radius: 8px; border: 1px solid var(--primary); background: rgba(255, 255, 255, 0.7); color: var(--text-main); font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer;">
                    <option value="PKN">Pendidikan Kewarganegaraan (PKN)</option>
                    <option value="MTK">Matematika (MTK)</option>
                    <option value="ALG">Algoritma (ALG)</option>
                    <option value="BUD">Agama Buddha (BUD)</option>
                </select>
            </div>
        </header>

        <div class="mode-toggle">
            <button class="btn active" id="btn-hafalan" onclick="switchMode('hafalan')">📖 Mode Hafalan (Before)</button>
            <button class="btn" id="btn-ujian" onclick="switchMode('ujian')">🎯 Mode Ujian (After)</button>
        </div>

        <!-- Mode Hafalan -->
        <div id="mode-hafalan" class="active">
            <div id="hafalan-list"></div>
        </div>

        <!-- Mode Ujian -->
        <div id="mode-ujian">
            <div class="flashcard-container" id="flashcard-ui">
                <div class="progress" id="quiz-progress">Soal 1 dari 10</div>
                <div class="live-score" style="margin-bottom: 20px; font-weight: bold; color: var(--text-main); display: flex; gap: 20px;">
                    <div>Benar: <span id="live-score-benar" style="color: #10b981;">0</span></div>
                    <div>Salah: <span id="live-score-salah" style="color: #ef4444;">0</span></div>
                </div>
                <div class="flashcard">
                    <div class="q-text" id="quiz-q">Pertanyaan muncul di sini?</div>
                    <div class="a-text" id="quiz-a">Jawaban akan muncul di sini.</div>
                </div>
                
                <div class="controls" id="controls-options" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px;">
                    <button class="btn btn-option" style="flex: 1 1 40%;" onclick="checkAnswer('A')">A</button>
                    <button class="btn btn-option" style="flex: 1 1 40%;" onclick="checkAnswer('B')">B</button>
                    <button class="btn btn-option" style="flex: 1 1 40%;" onclick="checkAnswer('C')">C</button>
                    <button class="btn btn-option" style="flex: 1 1 40%;" onclick="checkAnswer('D')">D</button>
                </div>
                
                <div class="controls hidden" id="controls-next">
                    <button class="btn btn-primary" onclick="nextQuestion()">Selanjutnya ➡️</button>
                </div>
            </div>

            <div class="result-screen hidden" id="result-ui">
                <div class="q-text" style="font-size: 2rem; margin-bottom: 20px;">Ujian Selesai! 🎉</div>
                <div class="score-circle" id="score-circle" style="--progress: 0%">
                    <div class="score-value" id="score-text">0%</div>
                </div>
                <p style="font-size: 1.2rem; margin-bottom: 30px;" id="score-message">Kamu berhasil mengingat 0 dari 0 soal.</p>
                <button class="btn btn-primary" onclick="startQuiz()">Ulangi Ujian 🔄</button>
            </div>
        </div>
    </div>

    <script>
        const allSoalData = {
            "PKN": [
    {
        "q": "1. Budi lahir di negara X yang menganut asas ius soli, namun kedua orang tuanya adalah warga negara Indonesia yang menganut asas ius sanguinis. Berdasarkan kondisi tersebut, Budi berpotensi mengalami status...\n\nA. apatride\nB. bipatride\nC. warga negara tunggal\nD. penduduk tanpa kewarganegaraan",
        "a": "B. bipatride"
    },
    {
        "q": "2. Seorang pengungsi yang tidak diakui sebagai warga negara oleh negara asalnya dan juga tidak diterima sebagai warga negara oleh negara tujuannya termasuk dalam kategori...\n\nA. apatride\nB. penduduk asing\nC. bipatride\nD. imigran gelap",
        "a": "A. apatride"
    },
    {
        "q": "3. Tata kelola pemerintahan yang baik dan bersih merupakan konsep dari ....\n\nA. desentralisasi\nB. good and clean governance\nC. demokrasi\nD. dekonsentrasi",
        "a": "B. good and clean governance"
    },
    {
        "q": "4. Pendidikan Kewarganegaraan di perguruan tinggi merupakan sumber nilai dan pedoman dalam penyelenggaraan program studi serta berguna dalam mengantarkan mahasiswa memantapkan kepribadiannya seutuhnya, hal ini merupakan ... Pendidikan Kewarganegaraan.\n\nA. visi\nB. moto\nC. misi\nD. amanat",
        "a": "A. visi"
    },
    {
        "q": "5. Berikut ini yang bukan termasuk tiga kelompok etnis di Belgia yang saling berebut pengaruh dan dominasi dalam suku ....\n\nA. Vlaam\nB. Vallon\nC. minoritas Belgia berbahasa Jerman\nD. Viking",
        "a": "D. Viking"
    },
    {
        "q": "6. Segala upaya untuk mempertahankan Negara Kesatuan Republik Indonesia dengan cara meningkatkan kesadaran berbangsa dan bernegara, menanamkan kecintaan terhadap tanah air, serta berperan aktif dalam memajukan bangsa dan negara, merupakan pengertian dari bela negara secara ....\n\nA. fisik\nB. subjektif\nC. nonfisik\nD. objektif",
        "a": "C. nonfisik"
    },
    {
        "q": "7. Integrasi nasional penting dan perlu pada suatu negara yang masyarakatnya ....\n\nA. majemuk\nB. seragam\nC. individualis\nD. sosialis",
        "a": "A. majemuk"
    },
    {
        "q": "8. Negara Indonesia menerapkan wawasan Nusantara sebagai geopolitik yang dipengaruhi oleh wawasan ....\n\nA. benua\nB. bahari\nC. dirgantara\nD. kombinasi",
        "a": "D. kombinasi"
    },
    {
        "q": "9. Membantu mahasiswa memantapkan kepribadiannya agar secara konsisten mampu mewujudkan nilai-nilai dasar Pancasila, rasa kebangsaan dan cinta tanah air dalam menguasai, menerapkan dan mengembangkan ilmu pengetahuan, teknologi dan seni dengan rasa tanggungjawab dan bermoral, merupakan .... Pendidikan Kewarganegaraan.\n\nA. visi\nB. moto\nC. misi\nD. amanat",
        "a": "C. misi"
    },
    {
        "q": "10. Integrasi nasional bagi bangsa Indonesia mutlak diperlukan karena karakteristik masyarakat Indonesia terdiri sebagai berikut, kecuali ....\n\nA. keberagaman etnis\nB. kondisi sosial yang berbeda\nC. sumber daya alam yang beragam\nD. keanekaragaman budaya",
        "a": "C. sumber daya alam yang beragam"
    },
    {
        "q": "11. Tujuan dari konstitusi adalah untuk ….\n\nA. Menciptakan kesatuan dalam keberagaman\nB. Membatasi kekuasaan dari penguasa dan mengatur jalannya penyelenggaraan negara\nC. Memperkuat pertahanan dan keamanan negara\nD. Melindungi kebudayaan nasional",
        "a": "B. Membatasi kekuasaan dari penguasa dan mengatur jalannya penyelenggaraan negara"
    },
    {
        "q": "12. Pentingnya mempelajari konstitusi suatu negara adalah untuk….\n\nA. Mengenal bagaimana cara kerja negara membangunan sistem ketatanegaraannya\nB. Mengetahui adat istiadat yang ada disuatu negara\nC. Mengatahui rencana pembangunan suatu negara\nD. Mengenal kebudayaan negara",
        "a": "A. Mengenal bagaimana cara kerja negara membangunan sistem ketatanegaraannya"
    },
    {
        "q": "13. Berikut yang bukan merupakan cita-cita negara Indonesia adalah…\n\nA. Menjadi negara yang berdaulat\nB. Menjadi negara yang adil\nC. Menjadi negara yang merdeka\nD. Menjadi negara yang bersatu",
        "a": "C. Menjadi negara yang merdeka"
    },
    {
        "q": "14. Di bawah ini yang bukan termasuk prinsip-prinsip good governance adalah....\n\nA. Taat hukum\nB. Komprehensif\nC. Responsif\nD. Akuntabilitas",
        "a": "B. Komprehensif"
    },
    {
        "q": "15. Yang termasuk di dalam azas umum otonomi daerah adalah....\n\nA. Desentralisasi\nB. Dekonsentrasi\nC. Tugas Pembaruan\nD. Tertib penyelenggaraan negara",
        "a": "A. Desentralisasi"
    },
    {
        "q": "16. Geostrategi politik luar negeri Indonesia menganut sistem politik bebas aktif yang dilaksanakan berdasarkan hal-hal berikut ini, kecuali . ...\n\nA. membina persahabatan dan kerja sama yang saling menguntungkan antarnegara\nB. meningkatkan citra positif Indonesia di kancah internasional\nC. kepentingan nasional disesuaikan dengan kepentingan perdamaian dunia\nD. menentang segala bentuk imperialisme dan kolonialisme",
        "a": "B. meningkatkan citra positif Indonesia di kancah internasional"
    },
    {
        "q": "17. Cara negara melindungi hak dan kewajiban warga negaranya ada lah dengan ....\n\nA. memberikan kebebasan kepada warga negara untuk melakukan keinginannya\nB. mengawasi warga negara yang tidak melakukan kewajiban\nC. menyusun regulasi yang tidak mengikat tentang perlindungan hak asasi manusia\nD. membangun sistem peradilan hak asasi manusia yang bermartabat dan terpercaya",
        "a": "D. membangun sistem peradilan hak asasi manusia yang bermartabat dan terpercaya"
    },
    {
        "q": "18. Geostrategi sangat terkait dengan aspek-aspek kehidupan sosial di bawah ini, kecuali ....\n\nA. ideologi\nB. politik\nC. sumber daya alam\nD. pertahanan",
        "a": "A. ideologi"
    },
    {
        "q": "19. Berikut ini yang bukan merupakan ciri-ciri sistem demokrasi yang dianut Negara Indonesia adalah ....\n\nA. sistem demokrasi perwakilan\nB. mengedepankan musyawarah dalam mengambil keputusan\nC. keadilan sosial dengan pemberian subsidi bagi seluruh rakyat Indonesia\nD. dijiwai oleh nilai-nilai Pancasila",
        "a": "C. keadilan sosial dengan pemberian subsidi bagi seluruh rakyat Indonesia"
    },
    {
        "q": "20. Berdasarkan Kamus Besar Bahasa Indonesia (KBBI) negara merupakan ....\n\nA. tanah yang diperjuangkan bersama\nB. alat politik yang disusun berdasarkan demokrasi\nC. organisasi dalam suatu wilayah yang mempunyai kekuasaan tertinggi yang sah dan ditaati oleh rakyat\nD. kesepakatan antara penduduk yang memiliki tujuan yang sama",
        "a": "C. organisasi dalam suatu wilayah yang mempunyai kekuasaan tertinggi yang sah dan ditaati oleh rakyat"
    },
    {
        "q": "21. Berikut yang bukan perwujudan wawasan Nusantara sebagai kesatuan politik yaitu ....\n\nA. Pancasila berperan sebagai ideologi bangsa dan negara\nB. kepulauan Nusantara sebagai satu kesatuan hukum\nC. kesatuan dan persatuan bangsa yang terdiri dari beragam suku, agama dan ras\nD. kekayaan wilayah Nusantara baik potensial maupun efektif merupakan modal bersama bangsa",
        "a": "B. kepulauan Nusantara sebagai satu kesatuan hukum"
    },
    {
        "q": "22. Berikut yang bukan rumusan ketahanan nasional yang tercermin dalam dokumen Garis-Garis Besar Haluan Negara (GBHN) tahun 1998 yaitu ....\n\nA. ketahanan nasional didasari oleh Asta Gatra\nB. ketahanan nasional sebagai konsepsi atau doktrin\nC. ketahanan mencerminkan keterpaduan antara segala aspek kehidupan nasional bangsa secara utuh dan menyeluruh\nD. ketahanan nasional merupakan ketangguhan suatu bangsa untuk dapat menjamin kelangsungan hidup menuju kejayaan bangsa dan negara",
        "a": "B. ketahanan nasional sebagai konsepsi atau doktrin"
    },
    {
        "q": "23. Salah satu pilar utama di dalam pelaksanaan demokrasi tidak langsung adalah pelaksanaan pemilihan yang bebas dan jujur. Arti bebas dalam hal ini adalah ....\n\nA. pemilihan diselenggarakan oleh lembaga independen yang berada di luar pemerintahan\nB. setiap warga negara berhak untuk menjadi calon pemimpin\nC. waktu pemilihan bebas untuk dipilih oleh warga negara\nD. rakyat bebas memilih calon pemimpin tanpa intervensi dari pemerintah maupun pihak lain",
        "a": "D. rakyat bebas memilih calon pemimpin tanpa intervensi dari pemerintah maupun pihak lain"
    },
    {
        "q": "24. Berikut yang bukan merupakan faktor-faktor yang dapat memudarkan filosofi bangsa Indonesia adalah ....\n\nA. globalisasi\nB. materialisme\nC. patriotisme\nD. hedonisme",
        "a": "C. patriotisme"
    },
    {
        "q": "25. Indonesia Raya sebagai lagu kebangsaan pertama kali dinyanyikan pada ....\n\nA. Kemerdekaan Indonesia tanggal 17 Agustus 1945\nB. Sumpah palapa yang dikemukakan Gadjah Mada\nC. Kongres Sumpah Pemuda Tahun 1928\nD. Persidangan BPUPKI 29 Mei 1945",
        "a": "C. Kongres Sumpah Pemuda Tahun 1928"
    },
    {
        "q": "26. Berikut yang bukan identitas nasional dalam arti fisik yaitu . ...\n\nA. bendera merah putih\nB. lambang negara\nC. jati diri psikis bangsa\nD. Bahasa Indonesia",
        "a": "C. jati diri psikis bangsa"
    },
    {
        "q": "27. Tujuan dari dibentuknya suatu negara adalah sebagai berikut, kecuali ....\n\nA. membangun tatanan kehidupan masyarakat agar teratur dan berjalan lebih baik\nB. menciptakan kehidupan yang serasi, selaras, dan seimbang antarkebutuhan manusia\nC. menciptakan kesatuan di antara orang-orang yang saling merasa setia kawan\nD. menjamin hak warga negara, perlindungan keamanan, dan perlakuan yang sama di depan hukum",
        "a": "C. menciptakan kesatuan di antara orang-orang yang saling merasa setia kawan"
    },
    {
        "q": "28. Berikut ini yang bukan merupakan fungsi negara adalah ....\n\nA. menjaga keamanan dan ketertiban\nB. menegakkan keadilan\nC. mengupayakan kesejahteraan\nD. mempersiapkan perang",
        "a": "D. mempersiapkan perang"
    },
    {
        "q": "29. Segala hak, wewenang, dan kewajiban daerah otonom untuk mengatur sendiri urusan pemerintahan, kepentingan masyarakat setempat sesuai dengan peraturan yang berlaku di Indonesia dinamakan ....\n\nA. desentralisasi\nB. dekonsentralisasi\nC. tugas pembantuan\nD. otonomi daerah",
        "a": "D. otonomi daerah"
    },
    {
        "q": "30. Sejak diratifikasinya UNCLOS setelah adanya Deklarasi Djuanda, wilayah laut NKRI menjadi lebih luas karena dalam deklarasi tersebut dinyatakan bahwa ....\n\nA. wilayah laut Indonesia menjadi 5,9 juta Km2\nB. lebar laut teritorial Indonesia menjadi 12 mil yang dihitung dari garis yang menghubungkan pulau terluar Indonesia\nC. Negara Kesatuan Republik Indonesia adalah sebuah negara kepulauan yang berciri nusantara\nD. wilayah RI terdiri atas gugusan pulau-pulau dan lautan",
        "a": "B. lebar laut teritorial Indonesia menjadi 12 mil yang dihitung dari garis yang menghubungkan pulau terluar Indonesia"

        let savedSubject = localStorage.getItem('selectedSubject') || "PKN";
        let soalData = allSoalData[savedSubject];

        // Set the dropdown to match the saved subject when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            const selectEl = document.getElementById('subject-select');
            if (selectEl) {
                selectEl.value = savedSubject;
            }
        });

        function changeSubject() {
            const subject = document.getElementById('subject-select').value;
            localStorage.setItem('selectedSubject', subject);
            soalData = allSoalData[subject];
            
            // Hide result UI if visible
            document.getElementById('result-ui').classList.add('hidden');
            
            // Re-render hafalan
            renderHafalan();
            
            // Restart quiz if in Ujian mode
            if (document.getElementById('btn-ujian').classList.contains('active')) {
                startQuiz();
            }
        }

        // --- Init Hafalan ---
        function renderHafalan() {
            const list = document.getElementById('hafalan-list');
            list.innerHTML = '';
            const shuffledData = [...soalData].sort(() => Math.random() - 0.5);
            shuffledData.forEach((item, index) => {
                const cleanQ = item.q.replace(/^\d+\.\s*/, '');
                list.innerHTML += `
                    <div class="qna-card">
                        <div class="question">${index + 1}. ${cleanQ}</div>
                        <div class="answer">${item.a}</div>
                    </div>
                `;
            });
        }

        // --- Logic Switch Mode ---
        function switchMode(mode) {
            document.getElementById('btn-hafalan').classList.remove('active');
            document.getElementById('btn-ujian').classList.remove('active');
            document.getElementById('mode-hafalan').classList.remove('active');
            document.getElementById('mode-ujian').classList.remove('active');

            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('mode-' + mode).classList.add('active');

            if(mode === 'ujian') {
                startQuiz();
            }
        }

        // --- Logic Ujian ---
        let currentIndex = 0;
        let score = 0;
        let forgotScore = 0;
        let currentQuizData = [];
        let isAnswered = false;

        function startQuiz() {
            currentQuizData = [...soalData].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            score = 0;
            forgotScore = 0;
            
            document.getElementById('live-score-benar').innerText = '0';
            document.getElementById('live-score-salah').innerText = '0';
            
            document.getElementById('flashcard-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            isAnswered = false;
            document.getElementById('quiz-progress').innerText = `Soal ${currentIndex + 1} dari ${currentQuizData.length}`;
            const cleanQ = currentQuizData[currentIndex].q.replace(/^\d+\.\s*/, '');
            document.getElementById('quiz-q').innerHTML = `${currentIndex + 1}. ${cleanQ}`;
            document.getElementById('quiz-a').innerHTML = currentQuizData[currentIndex].a;
            
            document.getElementById('quiz-a').classList.remove('visible');
            document.getElementById('controls-options').classList.remove('hidden');
            document.getElementById('controls-next').classList.add('hidden');
            
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                btn.className = 'btn btn-option';
                btn.disabled = false;
            });
        }

        function checkAnswer(selectedLetter) {
            if(isAnswered) return;
            isAnswered = true;
            
            const qData = currentQuizData[currentIndex];
            let correctLetter = 'A';
            const match = qData.a.match(/^([A-D])\./i);
            if (match) {
                correctLetter = match[1].toUpperCase();
            } else {
                if (qData.a.trim().startsWith('A')) correctLetter = 'A';
                else if (qData.a.trim().startsWith('B')) correctLetter = 'B';
                else if (qData.a.trim().startsWith('C')) correctLetter = 'C';
                else if (qData.a.trim().startsWith('D')) correctLetter = 'D';
            }
            
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctLetter) {
                    btn.classList.add('btn-success');
                }
            });
            
            if (selectedLetter === correctLetter) {
                score++;
                document.getElementById('live-score-benar').innerText = score;
            } else {
                forgotScore++;
                document.getElementById('live-score-salah').innerText = forgotScore;
                buttons.forEach(btn => {
                    if (btn.innerText === selectedLetter) {
                        btn.classList.add('btn-danger');
                    }
                });
            }
            
            document.getElementById('quiz-a').classList.add('visible');
            document.getElementById('controls-next').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;

            if (currentIndex < currentQuizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('flashcard-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            
            const percentage = Math.round((score / currentQuizData.length) * 100);
            document.getElementById('score-circle').style.setProperty('--progress', `${percentage}%`);
            document.getElementById('score-text').innerText = `${percentage}%`;
            document.getElementById('score-message').innerText = `Kamu berhasil mengingat ${score} dari ${currentQuizData.length} soal.`;
        }

        // Initialize
        renderHafalan();

    </script>
</body>
</html>
